<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Experiment 1</h1>
    <h2>Please open the console (F12 or Inspect > Console) to see the output of my program.</h2>

    <script>
        /* This program iterates through numbers 1 to 100 and outputs a specific string 
        if the number is divisible by 3 (Fizz) or 5 (Buzz). 
        It demonstrates the use of sequence, selection, and loops.
        */

        // --- SEQUENCE ---
        // Initializing the range for our loop
        var startNum = 1;
        var endNum = 100;

        // --- LOOP ---
        // Using a for loop to count from 1 up to 100
        for (var i = startNum; i <= endNum; i++) {

            // --- SELECTION ---
            // Checking if the number is divisible by 3, 5, or both
            if (i % 3 === 0 && i % 5 === 0) {
                console.log("FizzBuzz");
            } 
            else if (i % 3 === 0) {
                console.log("Fizz");
            } 
            else if (i % 5 === 0) {
                console.log("Buzz");
            } 
            else {
                // If not divisible by 3 or 5, just print the number
                console.log(i);
            }
        }
    </script>
    
</body>
</html>
